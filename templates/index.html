<!DOCTYPE html>
<html>

<head>
    <title>Matrix Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            color: #222;
            padding: 30px;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            transition: 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .online {
            background: #00aa00;
        }

        .offline {
            background: #cc0000;
        }

        .form-switch .form-check-input:checked {
            background-color: #00aa00;
            border-color: #00aa00;
        }

        .symbol-pill {
            background: #e0e0e0;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 4px;
            display: inline-block;
        }

        .remove-btn {
            color: #cc0000;
            cursor: pointer;
            margin-left: 5px;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fff;
            border: 1px solid #00aa00;
            padding: 10px 15px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Matrix Control Center</h2>
            <div>
                <span id="powerDot" class="status-dot offline"></span>
                <strong id="powerLabel">Offline</strong>
                <button class="btn btn-sm btn-outline-dark ms-3" onclick="togglePower()">Toggle Power</button>
            </div>
        </div>

        <!-- BRIGHTNESS -->
        <div class="card p-4 mb-4">
            <div class="section-title">Brightness</div>
            <input type="range" class="form-range" min="1" max="255" id="brightnessSlider">
            <div class="mt-2"><span id="brightPercent">50</span>%</div>
        </div>

        <!-- WEATHER -->
        <div class="card p-4 mb-4">
            <div class="section-title">Weather</div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="weatherEnabled">
                <label class="form-check-label">Enabled</label>
            </div>
            <select class="form-select" id="weatherCity"></select>
        </div>

        <!-- STOCKS -->
        <div class="card p-4 mb-4">
            <div class="section-title">Stock Ticker</div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="stocksEnabled">
                <label class="form-check-label">Enabled</label>
            </div>
            <label>Update Interval (seconds)</label>
            <input type="number" class="form-control mb-3" id="stocksInterval" min="10">
            <div id="symbolContainer"></div>
            <div class="input-group mt-3">
                <input id="newSymbol" class="form-control" placeholder="Add symbol (e.g. AAPL)">
                <button class="btn btn-outline-dark" onclick="addSymbol()">Add</button>
            </div>
        </div>

        <!-- CLOCK -->
        <div class="card p-4 mb-4">
            <div class="section-title">World Clock</div>
            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="clockEnabled">
                <label class="form-check-label">Enabled</label>
            </div>
            <div id="clockCities"></div>
        </div>
        <!-- MUSIC (Spotify) -->
        <div class="card p-4 mb-4">
            <div class="section-title">Spotify Music</div>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="musicEnabled">
                <label class="form-check-label">Enabled</label>
            </div>

            <div class="mb-3">
                <strong>Now Playing:</strong>
                <div id="nowPlaying">Nothing playing</div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark" onclick="spotifyControl('previous')">⏮</button>
                <button class="btn btn-outline-dark" onclick="spotifyControl('play')">▶</button>
                <button class="btn btn-outline-dark" onclick="spotifyControl('pause')">⏸</button>
                <button class="btn btn-outline-dark" onclick="spotifyControl('next')">⏭</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-msg">Saved ✓</div>

    <script>
        let config = {
            brightness: 171,
            weather: { enabled: true, city: "Cedar City", cities: ["Cedar City", "San Francisco", "New York", "Duba, Saudi Arabia", "Guntur, India"] },
            stocks: { enabled: true, update_interval: 300, symbols: ["PL", "NVO", "BROS", "AMD", "WMT"] },
            clock: { enabled: true, cities: [{ name: "Cedar City", offset: -7 }, { name: "Guntur", offset: 5.5 }, { name: "San Francisco", offset: -7 }, { name: "Riyadh", offset: 3 }] }
        };

        function initUI() {
            // Brightness
            const slider = document.getElementById("brightnessSlider");
            slider.value = config.brightness;
            document.getElementById("brightPercent").innerText = Math.round(config.brightness / 255 * 100);
            slider.oninput = () => updateBrightness(slider.value);

            // Weather
            document.getElementById("weatherEnabled").checked = config.weather.enabled;
            document.getElementById("weatherEnabled").onchange = e => updateSetting("weather.enabled", e.target.checked);
            const weatherSelect = document.getElementById("weatherCity");
            config.weather.cities.forEach(city => {
                const opt = document.createElement("option");
                opt.value = city; opt.innerText = city;
                if (city === config.weather.city) opt.selected = true;
                weatherSelect.appendChild(opt);
            });
            weatherSelect.onchange = e => updateSetting("weather.city", e.target.value);

            // Stocks
            document.getElementById("stocksEnabled").checked = config.stocks.enabled;
            document.getElementById("stocksEnabled").onchange = e => updateSetting("stocks.enabled", e.target.checked);
            document.getElementById("stocksInterval").value = config.stocks.update_interval;
            document.getElementById("stocksInterval").onchange = e => updateSetting("stocks.update_interval", e.target.value);
            renderSymbols(config.stocks.symbols);

            // Clock
            document.getElementById("clockEnabled").checked = config.clock.enabled;
            document.getElementById("clockEnabled").onchange = e => updateSetting("clock.enabled", e.target.checked);
            const clockDiv = document.getElementById("clockCities");
            config.clock.cities.forEach(city => {
                const div = document.createElement("div");
                div.className = "d-flex justify-content-between";
                div.innerHTML = `<div>${city.name}</div><div>UTC ${city.offset}</div>`;
                clockDiv.appendChild(div);
            });
            // Music
            document.getElementById("musicEnabled").checked = config.music.enabled;
            document.getElementById("musicEnabled").onchange =
                e => updateSetting("music.enabled", e.target.checked);

            fetchNowPlaying();
            setInterval(fetchNowPlaying, 5000);
        }

        /* -------- POWER -------- */
        function togglePower() {
            const label = document.getElementById("powerLabel").innerText;
            const action = label === "Offline" ? "on" : "off";

            fetch("/power", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: action })
            })
            .then(res => res.json())
            .then(data => {
                // Server may return "on", "off", "already_on", "already_off"
                if (data.status === "on" || data.status === "already_on") {
                    updatePowerUI("on");
                } else if (data.status === "off" || data.status === "already_off") {
                    updatePowerUI("off");
                }
            })
            .catch(err => console.error("Power toggle failed", err));
        }

        function updatePowerUI(status) {
            const dot = document.getElementById("powerDot");
            const label = document.getElementById("powerLabel");
            if (status === "on") { dot.classList.replace("offline", "online"); label.innerText = "Online"; }
            else { dot.classList.replace("online", "offline"); label.innerText = "Offline"; }
        }

        // Fetch initial power status
        fetch("/power-status").then(r => r.json()).then(data => updatePowerUI(data.status));

        /* -------- BRIGHTNESS -------- */
        let brightnessTimeout;
        function updateBrightness(val) {
            document.getElementById("brightPercent").innerText = Math.round(val / 255 * 100);
            clearTimeout(brightnessTimeout);
            brightnessTimeout = setTimeout(() => updateSetting("brightness", val), 300);
        }

        /* -------- SYMBOLS -------- */
        function renderSymbols(symbols) {
            const container = document.getElementById("symbolContainer");
            container.innerHTML = "";
            symbols.forEach(s => {
                const span = document.createElement("span");
                span.className = "symbol-pill";
                span.innerHTML = `${s} <span class="remove-btn" onclick="removeSymbol('${s}')">✕</span>`;
                container.appendChild(span);
            });
        }
        function addSymbol() {
            const input = document.getElementById("newSymbol");
            const val = input.value.trim().toUpperCase();
            if (!val) return;
            fetch("/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key: "stocks.add_symbol", value: val }) })
                .then(r => r.json())
                .then(data => { renderSymbols(data.symbols); input.value = ""; showToast(); });
        }
        function removeSymbol(val) {
            fetch("/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key: "stocks.remove_symbol", value: val }) })
                .then(r => r.json())
                .then(data => { renderSymbols(data.symbols); showToast(); });
        }

        /* -------- TOAST -------- */
        function showToast() {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none" }, 1500);
        }

        /* -------- GENERIC UPDATE -------- */
        function updateSetting(key, value) {
            fetch("/update", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ key, value }) })
                .then(r => r.json()).then(() => showToast());
        }
        /* -------- SPOTIFY -------- */

        function spotifyControl(action) {
            fetch("/spotify/control", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action })
            })
            .then(r => r.json())
            .then(data => {
                fetchNowPlaying();
                showToast();
            });
        }

        function fetchNowPlaying() {
            fetch("/spotify/current")
                .then(r => r.json())
                .then(data => {
                    if (!data || !data.track) {
                        document.getElementById("nowPlaying").innerText = "Nothing playing";
                        return;
                    }

                    document.getElementById("nowPlaying").innerText =
                        `${data.track} — ${data.artist}`;
                });
        }
        window.onload = initUI;
    </script>
</body>

</html>
