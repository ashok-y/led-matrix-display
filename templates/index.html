<!DOCTYPE html>
<html>

<head>
    <title>Matrix Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            margin-bottom: 20px;
        }

        .form-range::-webkit-slider-runnable-track {
            background: #333;
        }
    </style>
</head>

<body>
    <div class="power-container">
        <button id="powerBtn" onclick="togglePower()" class="btn-on">
            Power: <span id="powerStatus">ON</span>
        </button>
    </div>

    <style>
        .btn-on {
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .btn-off {
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
        function togglePower() {
            const status = document.getElementById('powerStatus').innerText;
            const action = (status === 'ON') ? 'off' : 'on';

            fetch('/power', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action })
            })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('powerStatus').innerText = data.status.toUpperCase();
                    document.getElementById('powerBtn').className = (data.status === 'on') ? 'btn-on' : 'btn-off';
                });
        }
    </script>
    <script>    // Run this when the page loads
        document.addEventListener('DOMContentLoaded', (event) => {
            checkInitialPower();
        });

        function checkInitialPower() {
            fetch('/power-status')
                .then(response => response.json())
                .then(data => {
                    const btn = document.getElementById('powerBtn');
                    const statusSpan = document.getElementById('powerStatus');
                    console.log("Initial power status from server:", data.status);
                    // Sync the UI with the actual server state
                    if (data.status === 'on') {
                        btn.className = 'btn-on';
                        statusSpan.innerText = 'ON';
                        if (document.getElementById('masterPower'))
                            document.getElementById('masterPower').checked = true;
                    } else {
                        btn.className = 'btn-off';
                        statusSpan.innerText = 'OFF';
                        if (document.getElementById('masterPower'))
                            document.getElementById('masterPower').checked = false;
                    }
                });
        }
    </script>

    <div class="container">
        <h2 class="mb-4">Matrix Settings</h2>

        <div class="card">
            <div class="card-body">
                <label class="form-label">Brightness: <span id="brightVal" data-raw="{{ config.brightness }}">{{
                        (config.brightness / 255 * 100) | int }}</span>%</label>
                <input type="range" class="form-range" min="1" max="255" value="{{ config.brightness }}"
                    id="brightSlider" oninput="updateSetting('brightness', this.value)">
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Active Plugins</h5>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="music" {% if config.music %}checked{% endif %}
                        onchange="updateSetting('music.enabled', this.checked)">
                    <label class="form-check-label">Spotify Monitor</label>
                </div>

                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="stocks" {% if config.stocks.enabled %}checked{%
                        endif %} onchange="updateSetting('stocks.enabled', this.checked)">
                    <label class="form-check-label">Stock Ticker</label>
                </div>

                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="clock" {% if config.clock.enabled %}checked{%
                        endif %} onchange="updateSetting('clock.enabled', this.checked)">
                    <label class="form-check-label">World Clock</label>
                </div>
                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="weather" {% if config.weather.enabled
                        %}checked{% endif %} onchange="updateSetting('weather.enabled', this.checked)">
                    <label class="form-check-label">Weather Display</label>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateSetting(key, value) {
            // If the element is a checkbox, 'value' might be a string. 
            // We want to make sure we send true/false to the server.
            let valToSend = value;

            // Update the brightness label UI if applicable
            if (key.includes('brightness')) {
                const label = document.getElementById('brightVal');
                if (label) label.innerText = Math.round((value / 255) * 100);
            }

            console.log(`Sending update: ${key} = ${valToSend}`);

            fetch('/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: key, value: valToSend })
            })
                .then(response => response.json())
                .then(data => console.log("Server response:", data))
                .catch(err => console.error("Error:", err));
        }
    </script>
</body>

</html>
